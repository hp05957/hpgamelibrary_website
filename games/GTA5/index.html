<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grand Theft Auto V</title>
<style>
  /* Sets the custom background image and centers the content */
  body {
    background-image: url('image_7986be.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    color: #ffffff;
    font-family: 'Arial', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  /* The main content box (made slightly transparent to show the background) */
  .gta-container {
    background-color: rgba(10, 10, 10, 0.85);
    padding: 50px;
    border: 2px solid #8b0000;
    border-radius: 8px;
    text-align: center;
    box-shadow: 0 0 25px rgba(255, 0, 0, 0.4);
    backdrop-filter: blur(4px);
  }

  .gta-title {
    color: #ff3333;
    font-size: 60px;
    font-weight: 900;
    margin: 0 0 40px 0;
    line-height: 1.1;
    text-transform: uppercase;
    text-shadow: 2px 2px 5px #000000;
  }

  /* Dropdown wrapper */
  .dropdown {
    position: relative;
    display: inline-block;
  }

  /* The main dropdown button */
  .dropbtn {
    background-color: #1a0000;
    color: #ff4d4d;
    padding: 16px 32px;
    font-size: 26px;
    font-weight: bold;
    border: 2px solid #8b0000;
    cursor: pointer;
    border-radius: 5px;
    transition: all 0.3s ease;
    text-transform: uppercase;
  }

  /* Button hover effect */
  .dropbtn:hover, .dropbtn:focus {
    background-color: #330000;
    color: #ffffff;
    box-shadow: 0 0 15px #ff4d4d;
  }

  /* Dropdown content (hidden by default) */
  .dropdown-content {
    display: none;
    position: absolute;
    background-color: rgba(5, 5, 5, 0.95);
    min-width: 100%;
    box-shadow: 0 8px 16px rgba(255, 0, 0, 0.2);
    border: 1px solid #8b0000;
    border-radius: 5px;
    margin-top: 5px;
    z-index: 1;
    overflow: hidden;
  }

  /* Links inside the dropdown */
  .dropdown-content a {
    color: #cccccc;
    padding: 15px 20px;
    text-decoration: none;
    display: block;
    font-size: 22px;
    font-weight: bold;
    transition: background-color 0.2s ease, color 0.2s ease;
  }

  /* Link hover effect */
  .dropdown-content a:hover {
    background-color: #2b0000;
    color: #ffffff;
  }

  /* Class added by JavaScript to show the menu */
  .show {
    display: block;
  }
</style>
</head>
<body>

<div class="gta-container">
  <h1 class="gta-title">GRAND THEFT AUTO V</h1>
  
  <div class="dropdown">
    <button onclick="toggleDropdown()" class="dropbtn">Pick a version ▼</button>
    <div id="versionDropdown" class="dropdown-content">
      <a href="./1-70">1.70 (114 GB)</a>
      <a href="./1-68">1.68 (112 GB)</a>
      <a href="./1-50">1.50 (72 GB)</a>
      <a href="./1-26">1.26 (59 GB)</a>
    </div>
  </div>
</div>

<script>
  /* Toggles between hiding and showing the dropdown content */
  function toggleDropdown() {
    document.getElementById("versionDropdown").classList.toggle("show");
  }

  /* Close the dropdown if the user clicks anywhere outside of it */
  window.onclick = function(event) {
    if (!event.target.matches('.dropbtn')) {
      var dropdowns = document.getElementsByClassName("dropdown-content");
      for (var i = 0; i < dropdowns.length; i++) {
        var openDropdown = dropdowns[i];
        if (openDropdown.classList.contains('show')) {
          openDropdown.classList.remove('show');
        }
      }
    }
  }
</script>

</body>
</html>
